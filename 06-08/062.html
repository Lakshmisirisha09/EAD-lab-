<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Student Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script>
    function showAlert(){
    document.getElementById("successMsg").style.display="block";
    return false;
    }
    </script>
</head>
<body class="bg-light">
<div class="container mt-5">
<h2 class="text-center text-primary mb-4">Student Registration Form</h2>
<div class="row justify-content-center">
<div class="col-md-8">
<form onsubmit="return showAlert()">
<div id="successMsg" class="alert alert-success text-center" style="display:none;">
Form Submitted Successfully!
</div> 
<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" placeholder="Enter your name">
</div>
<div class="mb-3">
<label class="form-label">Roll Number</label>
<input type="text" class="form-control" placeholder="Enter roll number">
</div>
<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter email">
</div>
<div class="mb-3">
<label class="form-label">Gender</label><br>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Male</label>
</div>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Female</label>
</div>
</div>
<div class="mb-3">
<label class="form-label">Department</label>
<select class="form-select">
<option selected>Select Department</option>
<option>CSE</option>
<option>IT</option>
<option>AI & ML</option>
<option>ECE</option>
</select>
</div>
<div class="mb-3">
<label class="form-label">Subjects</label><br>
<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Data Structures</label>
</div>
<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">DBMS</label>
</div>
<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Artificial Intelligence</label>
</div>
</div>
<div class="mb-3">
<label class="form-label">Upload Photo</label>
<input type="file" class="form-control">
</div>
<div class="text-center">
<button type="submit" class="btn btn-success me-2">
Submit
</button>
<button type="reset" class="btn btn-danger">
Reset
</button>
</div>
</form>
</div>
</div>
</div>

</body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
