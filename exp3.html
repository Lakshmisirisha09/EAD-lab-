<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback form</title>
</head>
<body>
    <h2>Feedback form</h2>
    <form>
        <label>Name:</label><br>
        <input type="text" name="name"><br><br>
        <label>Email:</label><br>
        <input type="email" name="email"><br><br>
        <label>Feedback:</label><br>
        <textarea name="Feedback" rows="4" cols="40"></textarea><br><br>
        <label>How satisfied you are?</label><br>
        <input type="radio" name="rate" value="satisfied">satisfied<br><br>
        <input type="radio" name="rate" value="Neutral ">Neutral <br><br>
        <input type="radio" name="rate" value="Unsatisfied">Unsatisfied<br><br>
        <button type="submit">submit</button>
    </form>
</body>
</html>
