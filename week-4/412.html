<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout</title>
    <link rel="stylesheet" href="s412.css">
</head>
</html>
<body>
<header>
    <h1>My Responsive Page</h1>
</header>
<div class="container">
    <div class="left">
        <h2>Left Section</h2>
        <p>
            This is the left column content. On desktop,
            it appears side by side with the right section.
        </p>
    </div>
    <div class="right">
        <h2>Right Section</h2>
        <p>
            On mobile screens, both sections stack
            one below the other.
        </p>
    </div>
</div>
</body>
</html>
