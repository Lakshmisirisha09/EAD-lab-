<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="s48.css">
    <title>Calculator UI</title>
</head>
</html>
<body>
<div class="calculator">
    <input type="text" class="display" placeholder="0" readonly>
    <div class="buttons">
    <button>C</button>
    <button>/</button>
    <button>*</button>
    <button>-</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button>+</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>=</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>0</button>
</div>
</div>
</body>
</html>
