<!DOCTYPE html>
<html>
<head>
<title>Employee Payroll System</title>
<link rel="stylesheet" href="s55.css">
</head>
<body>
<h1>Employee Payroll System</h1>
<div class="container">
<div class="input-panel">
<label>Employee Name</label>
<input type="text" id="name" placeholder="Enter name">
<label>Basic Salary</label>
<input type="number" id="basicSalary" placeholder="Enter basic salary">
<label>HRA</label>
<input type="number" id="hra" placeholder="Default 2000">
<label>TA</label>
<input type="number" id="ta" placeholder="Default 1000">
<button onclick="generateSalary()">Calculate Salary</button>
</div>
<div class="result-panel">
<h3>Salary Overview</h3>
<p id="gross"></p>
<p id="tax"></p>
<p id="net"></p>
</div>
</div>
<script src="j55.js"></script>
</body>
</html>
